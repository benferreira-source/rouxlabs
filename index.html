<!-- ============================================================
     SLICED STRIP — tall narrow slices of product photography,
     edge-to-edge across the viewport. Populated by JS below so
     image sources / object-positions stay editable in one array.

<script src="assets/js/cart.js"></script>
<script>
(function(){
    /* ---------- NYC timestamp ---------- */
    var stamp = document.querySelector("[data-home-timestamp]");
    if (stamp){
        var parts = new Intl.DateTimeFormat("en-US", {
            timeZone: "America/New_York",
            year: "numeric", month: "2-digit", day: "2-digit",
            hour: "2-digit", minute: "2-digit", hour12: true
        }).formatToParts(new Date());
        function p(t){
            var x = parts.find(function(o){ return o.type === t; });
            return x ? x.value : "";
        }
        stamp.textContent = p("month") + "/" + p("day") + "/" + p("year")
            + " " + p("hour") + ":" + p("minute")
            + (p("dayPeriod") || "").toLowerCase() + " NYC";
    }

    /* ---------- Sliced strip ----------
       Each entry frames a different focal point of a real product
       photo (or rack-context shot) via object-position. Repeated
       source images use different positions so they read as
       independent crops. Tag is optional. */
    var SLICES = [
        { src: "assets/img/products/flexport-bk-12.jpg", pos: "18% 50%", href: "flexport.html?color=BK", tag: "new" },
        { src: "assets/img/products/flexport-bk-12.jpg", pos: "62% 50%", href: "flexport.html?color=BK" },
        { src: "assets/img/products/flexport-rk-04.jpg", pos: "30% 50%", href: "flexport.html?color=RK", tag: "new" },
        { src: "assets/img/install-rack-closeup.jpg",    pos: "40% 50%", href: "flexport.html",         tag: "rack" },
        { src: "assets/img/products/flexport-wk-04.jpg", pos: "28% 50%", href: "flexport.html?color=WK", tag: "new" },
        { src: "assets/img/products/flexport-wk-08.jpg", pos: "70% 50%", href: "flexport.html?color=WK" },
        { src: "assets/img/install-flexport-detail.jpg", pos: "30% 50%", href: "flexport.html",         tag: "install" },
        { src: "assets/img/install-flexport-detail.jpg", pos: "72% 50%", href: "flexport.html" },
        { src: "assets/img/products/flexport-ok-12.jpg", pos: "22% 50%", href: "flexport.html?color=OK", tag: "new" },
        { src: "assets/img/products/flexport-ok-12.jpg", pos: "66% 50%", href: "flexport.html?color=OK" },
        { src: "assets/img/install-rack-full.jpg",       pos: "32% 50%", href: "about.html",            tag: "rack" },
        { src: "assets/img/install-rack-full.jpg",       pos: "56% 50%", href: "about.html" },
        { src: "assets/img/install-rack-full.jpg",       pos: "78% 50%", href: "about.html" },
        { src: "assets/img/products/flexport-rk-12.jpg", pos: "42% 50%", href: "flexport.html?color=RK", tag: "new" },
        { src: "assets/img/products/flexport-bk-04.jpg", pos: "50% 50%", href: "flexport.html?color=BK" },
        { src: "assets/img/install-rack-closeup.jpg",    pos: "76% 50%", href: "flexport.html" }
    ];

    var strip = document.querySelector("[data-home-strip]");
    if (strip){
        strip.innerHTML = SLICES.map(function(s){
            var style = "background-image:url('" + s.src + "');"
                      + "background-position:" + s.pos + ";";
            var tag = s.tag
                ? '<span class="home-slice-tag mono">' + s.tag + '</span>'
                : '';
            return '<a class="home-slice" href="' + s.href + '" aria-label="View product">'
                +   '<div class="home-slice-img" style="' + style + '"></div>'
                +   tag
                + '</a>';
        }).join("");
    }
})();
</script>
</body>

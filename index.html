<!-- ============================================================
     Scripts
     ============================================================ -->
<script src="assets/js/products.js?v=9"></script>
<script src="assets/js/cart.js?v=9"></script>
<script src="assets/js/motion.js?v=9" defer></script>
<script>
(function(){
    /* ---------- Logo plotter intro (first session-visit only) ----------
       Reveals the centered logo via a horizontal clip-path sweep with
       a thin safety-orange "pen" trailing the right edge. Skips on
       repeat visits and on prefers-reduced-motion. */
    var brand = document.querySelector(".home-intro-brand");
    if (brand){
        var seen = false;
        try { seen = sessionStorage.getItem("roux:plot:seen") === "1"; } catch(_){}
        var reduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (!seen && !reduced){
            brand.classList.add("plot-pending");
            requestAnimationFrame(function(){
                requestAnimationFrame(function(){ brand.classList.add("plot-go"); });
            });
            try { sessionStorage.setItem("roux:plot:seen", "1"); } catch(_){}
        }
    }

    /* ---------- MSP timestamp ----------
       Brand is Made in MN/USA — Minneapolis-St. Paul is the home city,
       so the brand timestamp matches the city code and uses Central time. */
    var stamp = document.querySelector("[data-home-timestamp]");
    if (stamp){
        var parts = new Intl.DateTimeFormat("en-US", {
            timeZone: "America/Chicago",
            year: "numeric", month: "2-digit", day: "2-digit",
            hour: "2-digit", minute: "2-digit", hour12: true
        }).formatToParts(new Date());
        function p(t){
            var x = parts.find(function(o){ return o.type === t; });
            return x ? x.value : "";
        }
        stamp.textContent = p("month") + "/" + p("day") + "/" + p("year")
            + " " + p("hour") + ":" + p("minute")
            + (p("dayPeriod") || "").toLowerCase() + " MSP";
    }

    /* ---------- Sliced strip ----------
       28 narrow slivers, edge-to-edge. Each entry frames a different
       focal point of a real product photo (or rack-context shot) via
       background-position. Repeated source images use different
       positions so each sliver reads as its own crop. No corner tags
       on slivers — the imagery stands alone. */
    var SLICES = [
        { src: "assets/img/products/flexport-bk-12.jpg",      pos: "20% 50%", href: "flexport.html?color=BK" },
        { src: "assets/img/products/flexport-bk-12.jpg",      pos: "60% 50%", href: "flexport.html?color=BK" },
        { src: "assets/img/install-rack-closeup.jpg",         pos: "30% 50%", href: "flexport.html" },
        { src: "assets/img/products/flexport-rk-04.jpg",      pos: "30% 50%", href: "flexport.html?color=RK" },
        { src: "assets/img/products/flexport-wk-08.jpg",      pos: "25% 50%", href: "flexport.html?color=WK" },
        { src: "assets/img/products/flexport-wk-08.jpg",      pos: "65% 50%", href: "flexport.html?color=WK" },
        { src: "assets/img/install-flexport-detail.jpg",      pos: "30% 50%", href: "flexport.html" },
        { src: "assets/img/install-flexport-detail.jpg",      pos: "60% 50%", href: "flexport.html" },
        { src: "assets/img/products/flexport-ok-12.jpg",      pos: "22% 50%", href: "flexport.html?color=OK" },
        { src: "assets/img/products/flexport-ok-12.jpg",      pos: "58% 50%", href: "flexport.html?color=OK" },
        { src: "assets/img/install-rack-full.jpg",            pos: "25% 50%", href: "about.html" },
        { src: "assets/img/install-rack-full.jpg",            pos: "55% 50%", href: "about.html" },
        { src: "assets/img/install-rack-full.jpg",            pos: "82% 50%", href: "about.html" },
        { src: "assets/img/products/flexport-rk-12.jpg",      pos: "30% 50%", href: "flexport.html?color=RK" },
        { src: "assets/img/products/flexport-rk-12.jpg",      pos: "70% 50%", href: "flexport.html?color=RK" },
        { src: "assets/img/products/flexport-bk-04.jpg",      pos: "50% 50%", href: "flexport.html?color=BK" },
        { src: "assets/img/install-rack-closeup.jpg",         pos: "60% 50%", href: "flexport.html" },
        { src: "assets/img/products/flexport-wk-04.jpg",      pos: "40% 50%", href: "flexport.html?color=WK" },
        { src: "assets/img/products/flexport-ok-08.jpg",      pos: "35% 50%", href: "flexport.html?color=OK" },
        { src: "assets/img/products/flexport-ok-08.jpg",      pos: "75% 50%", href: "flexport.html?color=OK" },
        { src: "assets/img/install-flexport-detail.jpg",      pos: "45% 50%", href: "flexport.html" },
        { src: "assets/img/install-flexport-detail.jpg",      pos: "78% 50%", href: "flexport.html" },
        { src: "assets/img/products/flexport-bk-08.jpg",      pos: "40% 50%", href: "flexport.html?color=BK" },
        { src: "assets/img/products/flexport-wk-12.jpg",      pos: "30% 50%", href: "flexport.html?color=WK" },
        { src: "assets/img/products/flexport-wk-12.jpg",      pos: "65% 50%", href: "flexport.html?color=WK" },
        { src: "assets/img/products/flexport-rk-08.jpg",      pos: "50% 50%", href: "flexport.html?color=RK" },
        { src: "assets/img/install-rack-closeup.jpg",         pos: "82% 50%", href: "flexport.html" },
        { src: "assets/img/products/flexport-ok-04.jpg",      pos: "45% 50%", href: "flexport.html?color=OK" }
    ];

    var strip = document.querySelector("[data-home-strip]");
    if (strip){
        // First 4 slivers eager (above the fold across all viewports);
        // rest lazy so off-screen photos don't burn ~1.6MB on initial paint.
        strip.innerHTML = SLICES.map(function(s, i){
            var eager = i < 4;
            var attrs = 'src="' + s.src + '" alt=""'
                      + ' loading="' + (eager ? "eager" : "lazy") + '"'
                      + ' decoding="async"'
                      + (eager ? ' fetchpriority="high"' : '')
                      + ' style="object-position:' + s.pos + '"';
            return '<a class="home-slice" href="' + s.href + '" aria-label="View FlexPort">'
                +   '<img class="home-slice-img" ' + attrs + '>'
                + '</a>';
        }).join("");
    }
})();
</script>
</body>

<body class="page-pdp">
<header class="site-header" data-roux-header></header>
<main>

<div class="container pdp-breadcrumb">
  <div class="crumbs">
    <a href="index.html">home</a><span class="sep">/</span><a href="shop.html">shop</a><span class="sep">/</span><span class="here" data-pdp-crumb>product</span>
  </div>
</div>

<section class="pdp">
  <div class="pdp-gallery">
    <div class="hero-shot" data-pdp-hero></div>
    <div class="pdp-thumbs" data-pdp-thumbs></div>
  </div>
  <div class="pdp-info">
    <div data-pdp-badges></div>
    <h1 data-pdp-name></h1>
    <p class="lead" data-pdp-lead></p>
    <div class="pdp-price" data-pdp-price></div>

    <div class="pdp-section" data-pdp-color-section>
      <h3>Colorway</h3>
      <div class="variant-row" data-pdp-colors></div>
    </div>

    <div class="pdp-section">
      <h3>Pack</h3>
      <div class="variant-row" data-pdp-sets></div>
    </div>

    <div class="pdp-section">
      <h3>Quantity</h3>
      <div class="qty-stepper" style="display:inline-flex">
        <button data-qty-dec aria-label="Decrease">−</button>
        <span class="val" data-qty-val>1</span>
        <button data-qty-inc aria-label="Increase">+</button>
      </div>
    </div>

    <div class="pdp-section">
      <button class="btn btn-orange btn-block" data-pdp-add>Add To Cart · <span data-pdp-add-price></span></button>
      <div class="pdp-microcopy">ships in 3 business days · free shipping over $150</div>
    </div>

    <div class="pdp-section">
      <h3>Specifications</h3>
      <dl class="specs" data-pdp-specs></dl>
    </div>
  </div>
</section>

</main>
<footer class="site-footer" data-roux-footer></footer>
<script src="assets/js/products.js?v=11"></script>
<script src="assets/js/cart.js?v=11"></script>
<script>
(function(){
    const id = new URLSearchParams(location.search).get("id") || "flexport-zero-u";
    const PRODUCT = window.ROUX.findProduct(id);
    if (!PRODUCT){ document.body.innerHTML = "<div class='page-pad container'><h1>Product not found</h1><p><a href='shop.html'>Back to shop</a></p></div>"; return; }
    if (id === "flexport-zero-u"){ location.href = "flexport.html"; return; }

    const state = Object.assign({}, PRODUCT.defaults, { qty: 1 });
    const el = {
        hero: document.querySelector("[data-pdp-hero]"),
        thumbs: document.querySelector("[data-pdp-thumbs]"),
        name: document.querySelector("[data-pdp-name]"),
        badges: document.querySelector("[data-pdp-badges]"),
        lead: document.querySelector("[data-pdp-lead]"),
        price: document.querySelector("[data-pdp-price]"),
        addPrice: document.querySelector("[data-pdp-add-price]"),
        colors: document.querySelector("[data-pdp-colors]"),
        colorSection: document.querySelector("[data-pdp-color-section]"),
        sets: document.querySelector("[data-pdp-sets]"),
        specs: document.querySelector("[data-pdp-specs]"),
        qtyVal: document.querySelector("[data-qty-val]"),
    };

    document.title = PRODUCT.name + " · Roux Labs";
    el.name.textContent = PRODUCT.name;
    const crumb = document.querySelector("[data-pdp-crumb]");
    if (crumb){ crumb.textContent = PRODUCT.name.toLowerCase(); }
    el.lead.textContent = PRODUCT.copy.lead;
    el.specs.innerHTML = PRODUCT.specs.map(function(s){ return '<dt>' + s[0] + '</dt><dd>' + s[1] + '</dd>'; }).join("");
    el.badges.innerHTML = (PRODUCT.badges || []).map(function(b){ return '<span class="tag tag-solid">' + b + '</span> '; }).join("");
    if (PRODUCT.colors.length === 1){ el.colorSection.style.display = "none"; }

    function priceForState(){
        return (PRODUCT.sets.find(function(s){ return s.size === state.set; }) || {}).price || PRODUCT.priceFrom;
    }
    function render(){
        el.colors.innerHTML = PRODUCT.colors.map(function(c){
            return '<button class="variant-chip' + (state.color === c.key ? ' active' : '') + '" data-set-color="' + c.key + '">'
                 + '<span class="swatch ' + c.swatchClass + '"></span>' + c.label + '</button>';
        }).join("");
        el.sets.innerHTML = PRODUCT.sets.map(function(s){
            return '<button class="variant-chip' + (state.set === s.size ? ' active' : '') + '" data-set-size="' + s.size + '">'
                 + 'Pack of ' + s.size + ' · ' + window.ROUX.formatPrice(s.price) + '</button>';
        }).join("");
        el.hero.innerHTML = window.ROUX.productSvg(PRODUCT.id, state.color, state.set);
        el.thumbs.innerHTML = PRODUCT.colors.map(function(c){
            return '<div class="thumb' + (state.color === c.key ? ' active' : '') + '" data-set-color="' + c.key + '">'
                 + window.ROUX.productSvg(PRODUCT.id, c.key, state.set) + '</div>';
        }).join("");
        const p = priceForState();
        el.price.textContent = window.ROUX.formatPrice(p);
        el.addPrice.textContent = window.ROUX.formatPrice(p * state.qty);
        el.qtyVal.textContent = String(state.qty);
    }

    document.addEventListener("click", function(e){
        const c = e.target.closest("[data-set-color]");  if (c){ state.color = c.getAttribute("data-set-color"); render(); }
        const s = e.target.closest("[data-set-size]");   if (s){ state.set = parseInt(s.getAttribute("data-set-size"),10); render(); }
        if (e.target.closest("[data-qty-inc]")){ state.qty = Math.min(99, state.qty + 1); render(); }
        if (e.target.closest("[data-qty-dec]")){ state.qty = Math.max(1, state.qty - 1); render(); }
        if (e.target.closest("[data-pdp-add]")){
            const set = PRODUCT.sets.find(function(x){ return x.size === state.set; });
            const colorMeta = PRODUCT.colors.find(function(x){ return x.key === state.color; });
            window.ROUX.cart.add({
                sku: window.ROUX.makeSku(PRODUCT.id, state.color, null, state.set),
                productId: PRODUCT.id,
                name: PRODUCT.name + " · Pack of " + state.set,
                color: colorMeta.label,
                orientation: null,
                setSize: state.set,
                price: set.price,
                qty: state.qty
            });
        }
    });
    render();
})();
</script>
</body>
</html>
